<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Folder Card Demo</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="demo-page">
      <section class="demo-wrap" aria-labelledby="folder-demo-title">
        <header class="demo-header">
          <h1 id="folder-demo-title">Interactive Folder Card</h1>
          <p>Hover on desktop, tap on touch devices.</p>
        </header>

        <button
          class="folder-card"
          type="button"
          data-folder-card
          aria-expanded="false"
          aria-label="Toggle folder preview"
        >
          <span class="folder-stack" aria-hidden="true">
            <span class="preview-card card-1">
              <img class="preview-image" src="../assets/img/folder-img-1.svg" alt="" />
            </span>

            <span class="preview-card card-2">
              <img class="preview-image" src="../assets/img/folder-img-2.svg" alt="" />
            </span>

            <span class="preview-card card-3">
              <img class="preview-image" src="../assets/img/folder-img-3.svg" alt="" />
            </span>
          </span>

          <span class="folder-shell" aria-hidden="true">
            <img class="folder-state folder-state-default" src="../assets/img/folder-state-default.svg" alt="" />
            <img class="folder-state folder-state-hovered" src="../assets/img/folder-state-hovered.svg" alt="" />
          </span>
        </button>
      </section>
    </main>
  </body>
</html>
